openapi: 3.0.0
info:
  title: Menzili Backend API
  description: REST API for Menzili platform with OTP authentication and user management
  version: 1.0.0
  contact:
    name: Menzili Support

servers:
  - url: http://localhost:8000/api
    description: Local Development
  - url: https://api.menzili.com/api
    description: Production

tags:
  - name: Auth
    description: Authentication endpoints

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Request OTP for login
      description: Send OTP via WhatsApp to user's phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: "+201234567890"
                  description: Phone number with country code
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
            default: application/json
          required: true
        - name: Accept-Language
          in: header
          schema:
            type: string
            enum: [ar, fr, en]
            default: en
          required: true
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "OTP sent"
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      otp:
                        type: string
                        example: "123456"
        '422':
          description: Validation error

  /auth/valid-otp:
    post:
      tags:
        - Auth
      summary: Verify OTP
      description: Verify OTP code and get authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - otp_code
              properties:
                phone:
                  type: string
                  example: "+201234567890"
                otp_code:
                  type: string
                  example: "123456"
                  description: 6-digit OTP
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
            default: application/json
          required: true
        - name: Accept-Language
          in: header
          schema:
            type: string
            enum: [ar, fr, en]
            default: en
          required: true
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "OTP verified"
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: "<plain-text-token>"
                      fill_name:
                        type: boolean
                        example: false
        '404':
          description: User not found
        '422':
          description: Invalid or expired OTP

  /auth/fill-name:
    post:
      tags:
        - Auth
      summary: Complete user profile (fill name)
      description: Update user name after OTP verification. Requires authentication token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Alice"
                  description: User's full name (2-100 characters)
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
            default: application/json
          required: true
        - name: Accept-Language
          in: header
          schema:
            type: string
            enum: [ar, fr, en]
            default: en
          required: true
        - name: Authorization
          in: header
          schema:
            type: string
            example: "Bearer <token>"
          required: true
          description: Token received from /auth/valid-otp
      responses:
        '200':
          description: Profile completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Profile completed"
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        description: User resource object
        '401':
          description: Unauthorized - invalid or missing token
        '422':
          description: Validation error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Token received from /auth/valid-otp endpoint'
